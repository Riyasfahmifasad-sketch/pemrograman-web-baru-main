<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 450px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .radio-group {
            margin-bottom: 16px;
        }
        .btn-group button,
        .btn-back {
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }
        .btn-submit { background: #007bff; color: #fff; }
        .btn-submit:hover { background: #0056b3; }
        .btn-reset { background: #f44336; color: #fff; }
        .btn-reset:hover { background: #b71c1c; }
        .btn-back { background: #6c757d; color: #fff; }
        .btn-back:hover { background: #495057; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kontak Kami</h2>

    <form action="proses.html">

        <label>Nama Lengkap</label>
        <input type="text" name="nama" placeholder="Masukkan nama">

        <label>Email</label>
        <input type="email" name="email" placeholder="Masukkan email">

        <label>Tanggal Lahir</label>
        <input type="date" name="tanggal">

        <label>Jenis Kelamin</label>
        <div class="radio-group">
            <input type="radio" name="jk" value="Laki-laki"> Laki-laki
            <input type="radio" name="jk" value="Perempuan"> Perempuan
        </div>

        <label>Pekerjaan</label>
        <select name="pekerjaan">
            <option value="">-- Pilih Pekerjaan --</option>
            <option>Pelajar</option>
            <option>Mahasiswa</option>
            <option>Karyawan</option>
            <option>Wiraswasta</option>
            <option>Lainnya</option>
        </select>

        <label>Warna Favorit</label>
        <input type="color" name="warna">

        <label>Upload File</label>
        <input type="file" name="file">

        <div class="btn-group">
            <button type="submit" class="btn-submit">Kirim</button>
            <button type="reset" class="btn-reset">Batal</button>
            <a href="index.html" class="btn-back">Balik ke Web Pertama</a>
        </div>

    </form>
</div>

</body>
</html>
